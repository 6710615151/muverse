<div id="reconciliation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="main-content">

        <div class="page-header">
            <h1 class="page-header__title">Wallet Reconciliation</h1>
            <p class="page-header__sub">Transaction records across all users for financial audit.</p>
        </div>

        <!-- Summary Cards -->
        <div id="recon-summary" style="display:flex;gap:12px;flex-wrap:wrap;margin:20px 0 24px;"></div>

        <!-- Filter + Search -->
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center;">
            <select id="recon-type-filter"
                style="padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);
                background:rgba(255,255,255,0.05);color:#fff;font-size:0.88rem;outline:none;">
                <option value="">All Types</option>
                <option value="DEPOSIT">DEPOSIT</option>
                <option value="WITHDRAW">WITHDRAW</option>
                <option value="PAYMENT">PAYMENT</option>
                <option value="INCOME">INCOME</option>
                <option value="HOLD">HOLD</option>
                <option value="REFUND">REFUND</option>
            </select>
            <input id="recon-search" type="text" placeholder="Search user name or email..."
                style="flex:1;min-width:200px;padding:8px 14px;border-radius:8px;
                border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);
                color:#fff;font-size:0.88rem;outline:none;">
            <span id="recon-count"
                style="font-size:0.82rem;color:rgba(255,255,255,0.45);white-space:nowrap;">
                0 records
            </span>
        </div>

        <!-- Table -->
        <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;font-size:0.88rem;min-width:820px;">
                <thead>
                    <tr style="border-bottom:2px solid rgba(255,255,255,0.1);">
                        <th style="text-align:left;padding:10px 14px;">Date</th>
                        <th style="text-align:left;padding:10px 14px;">User</th>
                        <th style="text-align:left;padding:10px 14px;">Type</th>
                        <th style="text-align:right;padding:10px 14px;">Amount (฿)</th>
                        <th style="text-align:left;padding:10px 14px;">Method</th>
                        <th style="text-align:left;padding:10px 14px;">Status</th>
                    </tr>
                </thead>
                <tbody id="recon-list">
                    <tr>
                        <td colspan="6"
                            style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
