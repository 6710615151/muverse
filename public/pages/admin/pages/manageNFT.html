<style>
  .nft-wrapper{width:100%;max-width:1100px;padding:12px 0 40px}
  .nft-header{margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid rgba(124,58,237,0.15)}
  .nft-title{font-family:'DM Sans',sans-serif;font-size:2rem;font-weight:800;color:#1a1a2e;letter-spacing:2px;text-transform:uppercase}
  .nft-title em{font-style:normal;color:#7c3aed}
  .nft-sub{color:#64748b;font-size:0.88rem;margin-top:6px}
  .nft-filter-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:0 0 16px;justify-content:space-between}
  .nft-input,.nft-select{padding:10px 16px;border-radius:10px;border:1.5px solid rgba(124,58,237,0.25);background:rgba(255,255,255,0.88);color:#1a1a2e;font-size:0.88rem;outline:none;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(63,2,80,0.06);transition:border-color 0.2s}
  .nft-input{flex:1;min-width:200px}
  .nft-input::placeholder{color:#94a3b8}
  .nft-input:focus,.nft-select:focus{border-color:#7c3aed}
  .nft-empty{text-align:center;padding:52px;color:#94a3b8;font-size:0.9rem}
  .nft-badge{padding:3px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;display:inline-block}
  .nft-badge-available{background:rgba(22,163,74,0.1);color:#16a34a}
  .nft-badge-out_of_stock{background:rgba(220,38,38,0.1);color:#dc2626}
  .nft-btn-add{padding:10px 20px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:0.88rem;cursor:pointer;font-weight:700;transition:background 0.2s;white-space:nowrap}
  .nft-btn-add:hover{background:#6d28d9}
  .nft-list-wrap{display:flex;flex-direction:column;gap:10px}
  .nft-card{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.9);border-radius:14px;border:1px solid rgba(124,58,237,0.12);padding:16px 20px;box-shadow:0 2px 12px rgba(63,2,80,0.07);transition:box-shadow 0.15s,transform 0.15s}
  .nft-card:hover{box-shadow:0 6px 24px rgba(63,2,80,0.13);transform:translateY(-1px)}
  .nft-card__img{width:64px;height:64px;flex-shrink:0;border-radius:10px;overflow:hidden;background:#f5f0e8;object-fit:cover}
  .nft-card__img-ph{width:64px;height:64px;flex-shrink:0;border-radius:10px;background:#f5f0e8;display:flex;align-items:center;justify-content:center;font-size:1.8rem}
  .nft-card__info{flex:1;min-width:0}
  .nft-card__name{font-weight:700;color:#1a1a2e;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:4px 0 2px}
  .nft-card__sub{font-size:0.78rem;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nft-card__meta{font-size:0.75rem;color:#7c3aed;margin-top:3px;font-weight:500}
  .nft-card__right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
  .nft-card__price{font-size:1.1rem;font-weight:800;color:#7c3aed}
  .nft-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .nft-stat-card{background:rgba(124,58,237,0.07);border-radius:12px;padding:16px 20px;text-align:center;border:1px solid rgba(124,58,237,0.12)}
  .nft-stat-num{font-size:1.6rem;font-weight:800;color:#7c3aed;display:block}
  .nft-stat-label{font-size:0.75rem;color:#64748b;font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
  /* Modal */
  .nft-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:9999}
  .nft-modal{background:#fff;border-radius:18px;padding:36px 40px;width:min(580px,92vw);max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(63,2,80,0.18)}
  .nft-modal__title{font-size:1.5rem;font-weight:800;color:#1a1a2e;margin-bottom:24px}
  .nft-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .nft-form-field{display:flex;flex-direction:column;gap:6px}
  .nft-form-field--full{grid-column:1/-1}
  .nft-form-label{font-size:0.82rem;font-weight:700;color:#3f0250;letter-spacing:0.4px}
  .nft-form-input{padding:10px 14px;border-radius:10px;border:1.5px solid rgba(124,58,237,0.25);background:#fafafa;color:#1a1a2e;font-size:0.88rem;outline:none;font-family:'DM Sans',sans-serif;transition:border-color 0.2s}
  .nft-form-input:focus{border-color:#7c3aed;background:#fff}
  .nft-form-textarea{min-height:80px;resize:vertical}
  .nft-btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .nft-btn-ghost{padding:10px 22px;border-radius:10px;border:1.5px solid rgba(124,58,237,0.3);background:transparent;color:#7c3aed;font-size:0.88rem;font-weight:700;cursor:pointer;transition:background 0.15s}
  .nft-btn-ghost:hover{background:rgba(124,58,237,0.07)}
  .nft-btn-primary{padding:10px 22px;border-radius:10px;border:none;background:#7c3aed;color:#fff;font-size:0.88rem;font-weight:700;cursor:pointer;transition:background 0.2s}
  .nft-btn-primary:hover{background:#6d28d9}
  .nft-btn-danger{background:linear-gradient(135deg,#e53e3e,#c53030);box-shadow:0 4px 18px rgba(229,62,62,0.3)}
  .nft-btn-danger:hover{background:linear-gradient(135deg,#c53030,#9b2c2c)}
  .nft-del-modal-center{text-align:center}
  .nft-del-modal-icon{font-size:2.5rem;margin-bottom:12px}
</style>

<!-- Add/Edit Modal -->
<div class="nft-modal-overlay" id="nft-modal">
  <div class="nft-modal">
    <h2 class="nft-modal__title" id="nft-modal-title">Add New NFT</h2>
    <form id="nft-form">
      <div class="nft-form-grid">
        <div class="nft-form-field nft-form-field--full">
          <label class="nft-form-label">NFT Name *</label>
          <input type="text" class="nft-form-input" id="nf-item-name" required placeholder="Enter NFT name">
        </div>
        <div class="nft-form-field">
          <label class="nft-form-label">Price (THB) *</label>
          <input type="number" class="nft-form-input" id="nf-price" min="0" step="1" required placeholder="0">
        </div>
        <div class="nft-form-field">
          <label class="nft-form-label">Quantity *</label>
          <input type="number" class="nft-form-input" id="nf-quantity" min="0" required placeholder="0">
        </div>
        <div class="nft-form-field">
          <label class="nft-form-label">Availability</label>
          <select class="nft-form-input" id="nf-status">
            <option value="available">Available</option>
            <option value="out_of_stock">Out of Stock</option>
          </select>
        </div>
        <div class="nft-form-field nft-form-field--full">
          <label class="nft-form-label">Description</label>
          <textarea class="nft-form-input nft-form-textarea" id="nf-description" placeholder="Describe this NFT..."></textarea>
        </div>
        <div class="nft-form-field nft-form-field--full">
          <label class="nft-form-label">NFT Image</label>
          <input type="file" id="nf-image" accept="image/*" class="nft-form-input" style="padding:6px">
          <div style="display:flex;align-items:center;gap:14px;margin-top:10px">
            <img id="nft-img-preview" src="" alt="preview" style="display:none;width:100px;height:100px;object-fit:cover;border-radius:10px;border:1px solid rgba(124,58,237,0.2)">
            <p id="nft-upload-result" style="font-size:0.82rem;color:#64748b"></p>
          </div>
        </div>
      </div>
      <div class="nft-btn-row">
        <button type="button" class="nft-btn-ghost" id="nft-modal-cancel">Cancel</button>
        <button type="submit" class="nft-btn-primary" id="nft-modal-save">Add NFT</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="nft-modal-overlay" id="nft-delete-modal">
  <div class="nft-modal" style="max-width:420px">
    <div class="nft-del-modal-center">
      <div class="nft-del-modal-icon">🗑️</div>
      <h2 class="nft-modal__title" style="margin-bottom:10px">Confirm Deletion?</h2>
      <p id="nft-delete-modal-name" style="color:#64748b;font-size:0.9rem;margin-bottom:6px">This NFT will be permanently removed.</p>
      <p style="color:#dc2626;font-size:0.8rem;margin-bottom:24px">This action cannot be undone.</p>
    </div>
    <div class="nft-btn-row" style="justify-content:center">
      <button class="nft-btn-ghost" id="nft-delete-cancel">Cancel</button>
      <button class="nft-btn-primary nft-btn-danger" id="nft-delete-confirm">Delete NFT</button>
    </div>
  </div>
</div>

  <div class="orb orb-2"></div>

    </div>

          <input type="text" id="nft-search" class="nft-input" placeholder="Search NFTs..." style="max-width:260px">

      <div style="overflow-y:auto;flex:1;min-height:0;">
