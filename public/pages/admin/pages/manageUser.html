<div id="user">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="main-content">

        <div class="page-header">
            <h1 class="page-header__title">Manage Users</h1>
            <p class="page-header__sub">จัดการผู้ใช้งานทั้งหมดในระบบ</p>
        </div>

        <input id="user-search" type="text" placeholder="ค้นหาชื่อหรืออีเมล..."
            style="width:100%;padding:10px 14px;margin-top:16px;border-radius:8px;
            border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);
            color:#fff;font-size:0.9rem;box-sizing:border-box;outline:none">

        <div style="margin-top:20px;overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:0.9rem">
                <thead>
                    <tr>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">ID</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">ชื่อ</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">อีเมล</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Role</th>
                        <th style="text-align:center;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Actions</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <tr>
                        <td colspan="5" style="text-align:center;padding:40px;opacity:0.5">กำลังโหลด...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
