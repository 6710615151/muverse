<div id="user">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="main-content">

        <div class="page-header">
            <h1 class="page-header__title">Manage Users</h1>
            <p class="page-header__sub">Manage all users in the system.</p>
        </div>

        <input id="user-search" type="text" placeholder="Search by name or email..."
            style="width:100%;padding:10px 14px;margin-top:16px;border-radius:8px;
            border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);
            color:#fff;font-size:0.9rem;box-sizing:border-box;outline:none">

        <div style="margin-top:20px;overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:0.9rem;min-width:700px">
                <colgroup>
                    <col style="width:120px">
                    <col style="width:160px">
                    <col>
                    <col style="width:100px">
                    <col style="width:110px">
                    <col style="width:180px">
                </colgroup>
                <thead>
                    <tr>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">ID</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Name</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Email</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Role</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Status</th>
                        <th style="text-align:center;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Actions</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <tr>
                        <td colspan="6" style="text-align:center;padding:40px;opacity:0.5">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
