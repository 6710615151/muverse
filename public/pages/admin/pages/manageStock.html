<div id="stock">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="main-content">

        <div class="page-header">
            <h1 class="page-header__title">Manage Stocks</h1>
            <p class="page-header__sub">Manage all stock items in the system.</p>
        </div>

        <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
            <input id="stock-search" type="text" placeholder="Search by item name or shop..."
                style="flex:1;min-width:200px;padding:10px 14px;border-radius:8px;
                border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);
                color:#fff;font-size:0.9rem;box-sizing:border-box;outline:none">
            <select id="stock-status-filter"
                style="padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);
                background:rgba(255,255,255,0.05);color:#080707;font-size:0.9rem;outline:none;cursor:pointer">
                <option value="">All statuses</option>
                <option value="available">available</option>
                <option value="out_of_stock">out_of_stock</option>
                <option value="pending">pending</option>
                <option value="banned">banned</option>
            </select>
        </div>

        <div style="margin-top:16px;overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:0.9rem">
                <thead>
                    <tr>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Image</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Item Name</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Shop</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Price</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Stock</th>
                        <th style="text-align:left;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Status</th>
                        <th style="text-align:center;padding:12px 16px;border-bottom:2px solid rgba(255,255,255,0.1)">Actions</th>
                    </tr>
                </thead>
                <tbody id="stock-list">
                    <tr><td colspan="7" style="text-align:center;padding:40px;opacity:0.5">Loading...</td></tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
