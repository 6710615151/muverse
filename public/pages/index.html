<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Muverse Welcome</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cinzel', serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: rgb(26, 2, 36);
        }

        .bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('../assets/bg.png') center/cover no-repeat;
            filter: brightness(0.4) contrast(1.2);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.85));
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 200, 120, 0.15), transparent 60%);
            animation: pulseGlow 6s infinite alternate;
        }

        @keyframes pulseGlow {
            from {
                opacity: 0.4;
            }

            to {
                opacity: 1;
            }
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ffffff;
            z-index: 10;
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 100, 0.6));
            transition: 0.4s;
        }

        .logo:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 0 30px gold);
        }

        h1 {
            font-size: 80px;
            letter-spacing: 12px;
            text-shadow: 0 0 20px gold;
        }

        p {
            margin-top: 10px;
            font-size: 20px;
            opacity: 0.85;
        }

        .buttons {
            margin-top: 40px;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 38px 70px;
            color: #f5d28c;
            text-decoration: none;
            border-radius: 50px;

            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(12px);

            background: rgba(255, 255, 255, 0.08);
            border: 3px solid rgba(255, 215, 120, 0.25);

            box-shadow:
                inset 0 0 10px rgba(255, 215, 120, 0.15),
                0 0 15px rgba(255, 215, 120, 0.15);

            transition: 0.4s;
            position: relative;
            overflow: hidden;
            font-size: 25px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(103, 16, 132, 0.4), transparent);
            transition: 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow:
                0 0 25px rgba(255, 215, 120, 0.6),
                inset 0 0 20px rgba(255, 215, 120, 0.3);
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: gold;
            border-radius: 50%;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 0;
            }

            to {
                transform: translateY(-10vh);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="glow"></div>

    <script>
        for (let i = 0; i < 50; i++) {
            let p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "%";
            p.style.animationDuration = (6 + Math.random() * 6) + "s";
            document.body.appendChild(p);
        }
    </script>

    <div class="content">

  
        <img src="../assets/logo.png" class="logo">

        <h1>MUVERSE</h1>
        <p>Where Sacred Power Connects</p>

        <div class="buttons">
            <a href="signin.html" class="btn">GET START</a>

        </div>

    </div>

</body>

</html>
