<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CN230 MU-Verse | รายวิชา</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<div id="toast-container"></div>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">CN230 Project</div>
      <h1>MU-Verse</h1>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-label">เมนูหลัก</span>
      <a href="/"            class="nav-link"><span class="icon">⊞</span> Dashboard</a>
      <a href="/students"    class="nav-link"><span class="icon">🎓</span> นักศึกษา</a>
      <a href="/courses"     class="nav-link"><span class="icon">📚</span> รายวิชา</a>
      <a href="/enrollments" class="nav-link"><span class="icon">📋</span> การลงทะเบียน</a>
      <span class="nav-label">รายงาน</span>
      <a href="/reports"     class="nav-link"><span class="icon">📊</span> รายงาน & GPA</a>
    </nav>
    <div class="sidebar-footer">Mahidol University · 2024</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">📚 รายวิชา</div>
        <div class="topbar-sub">จัดการรายวิชาทั้งหมด</div>
      </div>
      <button class="btn btn-primary" onclick="openCreate()">+ เพิ่มรายวิชา</button>
    </div>

    <div class="content">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">รายวิชาทั้งหมด</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card" style="--accent:#4ade80">
          <div class="stat-label">หน่วยกิตรวม</div>
          <div class="stat-value" id="stat-credits">—</div>
        </div>
        <div class="stat-card" style="--accent:#fbbf24">
          <div class="stat-label">ภาควิชา</div>
          <div class="stat-value" id="stat-depts">—</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">รายวิชาทั้งหมด</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>รหัสวิชา</th>
                <th>ชื่อวิชา</th>
                <th>หน่วยกิต</th>
                <th>อาจารย์ผู้สอน</th>
                <th>ภาควิชา</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="courses-tbody">
              <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Add/Edit Course -->
<div class="modal-overlay" id="course-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">เพิ่มรายวิชา</div>
      <button class="modal-close" onclick="closeModal('course-modal')">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">รหัสวิชา *</label>
        <input class="form-input" id="field-course-id" placeholder="เช่น CN230" />
      </div>
      <div class="form-group">
        <label class="form-label">หน่วยกิต *</label>
        <select class="form-select" id="field-credits">
          <option value="">เลือก</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ชื่อวิชา *</label>
      <input class="form-input" id="field-course-name" placeholder="ชื่อเต็มรายวิชา" />
    </div>
    <div class="form-group">
      <label class="form-label">อาจารย์ผู้สอน *</label>
      <input class="form-input" id="field-instructor" placeholder="ชื่ออาจารย์" />
    </div>
    <div class="form-group">
      <label class="form-label">ภาควิชา *</label>
      <select class="form-select" id="field-department">
        <option value="">เลือกภาควิชา</option>
        <option>Computer Science</option>
        <option>Information Technology</option>
        <option>Data Science</option>
        <option>Computer Engineering</option>
        <option>Mathematics</option>
        <option>Physics</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('course-modal')">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveCourse()">บันทึก</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/courses.js"></script>
</body>
</html>
