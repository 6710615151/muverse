<div id="seller-stock-page" height="723px">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="main-content" style="height: 100%;display: flex;flex-direction: column;">

    <div class="modal-overlay" id="stock-modal">
      <div class="modal" style="max-width:580px;width:90%;text-align:left;padding:36px 40px">
        <h2 class="modal__title" id="modal-title" style="text-align:left;font-size:1.8rem;margin-bottom:24px">
          Add New Product
        </h2>
        <form id="stock-form">
          <div class="form-grid">
            <div class="form-field form-field--full">
              <label class="form-label">Product Name *</label>
              <input type="text" class="form-input" id="f-item-name" required placeholder="Enter product name">
            </div>
            <div class="form-field">
              <label class="form-label">Category *</label>
              <select class="form-input" id="f-category" required>
                <option value="">Select Category</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label">Product Type</label>
              <input type="text" class="form-input" id="f-item-type" placeholder="e.g., physical, digital">
            </div>
            <div class="form-field">
              <label class="form-label">Price (THB) *</label>
              <input type="number" class="form-input" id="f-price" min="0" step="1" required placeholder="0">
            </div>
            <div class="form-field">
              <label class="form-label">Quantity *</label>
              <input type="number" class="form-input" id="f-quantity" min="0" required placeholder="0">
            </div>
            <div class="form-field form-field--full">
              <label class="form-label">Description</label>
              <textarea class="form-input form-textarea" id="f-description"
                placeholder="Describe your product..."></textarea>
            </div>
            <div class="form-field">
              <label class="form-label">Availability Status</label>
              <select class="form-input" id="f-status">
                <option value="available">Available</option>
                <option value="out_of_stock">Out of Stock</option>
              </select>
            </div>
            <div class="form-field form-field--full">
              <label class="form-label">Product Image</label>
              <input type="file" id="f-image" accept="image/*" class="form-input" style="padding:6px">
              <div style="display:flex;align-items:center;gap:14px;margin-top:10px">
                <img id="img-preview" src="" alt="preview"
                  style="display:none;width:100px;height:100px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,0.1)">
                <p id="upload-result" style="font-size:0.82rem;opacity:0.65"></p>
              </div>
            </div>
          </div>
          <div class="btn-row" style="margin-top:16px">
            <button type="button" class="btn btn--ghost" id="modal-cancel-btn">Cancel</button>
            <button type="submit" class="btn btn--primary" id="modal-save-btn">Add Product</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal-overlay" id="delete-modal">
      <div class="modal">
        <span class="modal__icon">🗑</span>
        <h2 class="modal__title">Confirm Deletion?</h2>
        <p class="modal__sub" id="delete-modal-name">This item will be permanently removed from the system.</p>
        <p class="modal__note">This action cannot be undone.</p>
        <div class="btn-row" style="justify-content:center;gap:12px">
          <button class="btn btn--ghost" id="delete-cancel-btn">Cancel</button>
          <button class="btn btn--primary" id="delete-confirm-btn"
            style="background:linear-gradient(135deg,#e53e3e,#c53030);box-shadow:0 4px 18px rgba(229,62,62,0.3)">
            Delete Product
          </button>
        </div>
      </div>
    </div>

    <div class="page-header"
      style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px">
      <div>
        <p style="color:var(--clr-gold);font-size:0.82rem;font-weight:500;letter-spacing:0.15em;
        text-transform:uppercase;margin-bottom:10px">✦ STORE MANAGEMENT</p>
        <h1 class="page-header__title">My <em>Inventory</em></h1>
        <p class="page-header__sub">Add, edit, and manage all products in your store</p>
      </div>
      <button class="btn btn--primary btn--large" id="add-stock-btn">+ Add New Product</button>
    </div>

    <div class="dash-stats" style="padding:20px 64px 32px;grid-template-columns:repeat(3,1fr)">
      <div class="dash-stat-card">
        <span class="dash-stat-card__num" id="stat-total" style="color:#ffffffc9">—</span>
        <span class="dash-stat-card__label">Total Products</span>
      </div>
      <div class="dash-stat-card">
        <span class="dash-stat-card__num" id="stat-available" style="color:#ffffffc9">—</span>
        <span class="dash-stat-card__label">Available</span>
      </div>
      <div class="dash-stat-card">
        <span class="dash-stat-card__num" id="stat-out" style="color:#ffffffc9">—</span>
        <span class="dash-stat-card__label">Out of Stock</span>
      </div>
    </div>

    <div class="filter-bar">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input type="text" id="stock-search" class="form-input" placeholder="Search products..."
          style="width:200px;padding:8px 14px">
        <select id="stock-cat-filter" class="filter-select">
          <option value="">All Categories</option>
        </select>
        <select id="stock-sort" class="filter-select">
          <option value="">Sort By</option>
          <option value="name">Name A–Z</option>
          <option value="price-asc">Price ↑</option>
          <option value="price-desc">Price ↓</option>
          <option value="qty-asc">Quantity ↑ (Low first)</option>
        </select>
      </div>
      <p class="marketplace-count">Total <strong id="stock-count">0</strong> items</p>
    </div>

    <div style="padding:32px 64px;overflow-y: scroll; height: 100%;flex-grow: 1;">
      <div class="booking-list" id="stock-list">
        <div style="padding:80px;text-align:center;color:var(--clr-text-muted)">
          <p style="font-size:2rem;margin-bottom:12px">⏳</p>
          <p>Loading products...</p>
        </div>
      </div>
    </div>
  </div>
</div>
