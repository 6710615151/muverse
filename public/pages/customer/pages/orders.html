<div id="orders-page">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="main-content">

        <div class="page-header">
            <h1 class="page-header__title">MY <em>ORDERS</em></h1>
            <p class="page-header__sub"></p>
        </div>

        <div class="filter-bar">
            <div class="filter-bar__tabs" id="order-filter-tabs">
                <button class="filter-tab active" data-status="all">All</button>
                <button class="filter-tab" data-status="pending">Pending</button>
                <button class="filter-tab" data-status="shipped">Shipped</button>
                <button class="filter-tab" data-status="completed">Completed</button>
            </div>
        </div>

        <div style="padding: 12px 24px 32px;">
            <div class="booking-list" id="orderList">
                <p style="color: var(--clr-text-muted); text-align:center; padding: 40px 0;">Loading...</p>
            </div>
        </div>

    </div>
</div>
