<div id="market-page">

  <!-- ─── Page Header ─── -->
  <div class="page-header">
    <p style="color:var(--clr-gold);font-size:0.82rem;font-weight:500;letter-spacing:0.15em;
      text-transform:uppercase;margin-bottom:10px">✦ ค้นหาสินค้าและบริการ</p>
    <h1 class="page-header__title">Market<em>place</em></h1>
    <p class="page-header__sub">สินค้าและบริการจากผู้ขายที่ผ่านการคัดเลือก</p>
  </div>

  <!-- ─── Category Tabs + Search ─── -->
  <div class="filter-bar">
    <div class="filter-bar__tabs" id="mkt-cat-tabs">
      <button class="filter-tab active" data-cat-id="all">✦ ทั้งหมด</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input type="text" id="mkt-search" class="form-input"
        placeholder="ค้นหาสินค้า..." style="width:200px;padding:8px 14px">
      <select id="mkt-sort" class="filter-select">
        <option value="">เรียงลำดับ</option>
        <option value="price-asc">ราคา ↑ น้อยไปมาก</option>
        <option value="price-desc">ราคา ↓ มากไปน้อย</option>
        <option value="name">ชื่อ A–Z</option>
      </select>
    </div>
  </div>

  <!-- ─── Marketplace Layout ─── -->
  <div class="marketplace-layout">

    <!-- Sidebar -->
    <aside class="marketplace-sidebar">
      <h3 class="sidebar-title">ตัวกรอง</h3>

      <div class="sidebar-section">
        <p class="sidebar-section__title">ราคาสูงสุด</p>
        <div class="price-range">
          <input type="range" class="range-slider" id="mkt-price-range"
            min="0" max="10000" value="10000" step="100">
          <div class="price-range__labels">
            <span>฿0</span>
            <span id="mkt-price-display">฿10,000</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-section__title">สถานะสินค้า</p>
        <label class="sidebar-check">
          <input type="checkbox" id="mkt-filter-available" checked>
          มีสินค้าพร้อมส่ง
        </label>
        <label class="sidebar-check">
          <input type="checkbox" id="mkt-filter-outofstock">
          สินค้าหมด
        </label>
      </div>
    </aside>

    <!-- Main content -->
    <div class="marketplace-main">
      <div class="marketplace-toolbar">
        <p class="marketplace-count">
          พบ <strong id="mkt-count">0</strong> รายการ
        </p>
        <div class="marketplace-view-toggle">
          <button class="view-btn active" title="Grid">⊞</button>
        </div>
      </div>
      <div class="product-grid" id="mkt-grid">
        <div style="grid-column:1/-1;padding:80px;text-align:center;color:var(--clr-text-muted)">
          <p style="font-size:2rem;margin-bottom:12px">⏳</p>
          <p>กำลังโหลดสินค้า...</p>
        </div>
      </div>
    </div>

  </div>
</div>
