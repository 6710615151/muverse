<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muverse Auth</title>

    <link rel="stylesheet" href="../auth/auth.css">
</head>

<body>
    <div class="bg" id="bg">
        <img src="../assets/bg1.png">
        <img src="../assets/bg2.png">
        <img src="../assets/bg3.png">
    </div>

    <div class="overlay"></div>

    <div class="container" id="container">

        <div class="form-box sign-in">
            <h2>Sign In</h2>
            <form id="sign-in-form" novalidate>
                <div class="field"><input type="email" id="si-email" placeholder="Email address" autocomplete="email">
                </div>
                <div class="field"><input type="password" id="si-pass" placeholder="Password"
                        autocomplete="current-password"></div>
                <button type="submit" class="btnIn">Sign In</button>
                <p class="msg" id="si-msg"></p>
            </form>
        </div>

        <div class="form-box sign-up">
            <h2>Sign Up </h2>
            <form id="sign-up-form" novalidate>
                <div class="field"><input type="text" id="su-name" placeholder="Full name" autocomplete="name"></div>
                <div class="field"><input type="email" id="su-email" placeholder="Email address" autocomplete="email">
                </div>
                <div class="field"><input type="password" id="su-pass" placeholder="Password"
                        autocomplete="new-password"></div>
                <div class="field"><input type="tel" id="su-phone" placeholder="Phone number" autocomplete="tel"></div>
                <button type="submit" class="btn">Create account</button>
                <p class="msg" id="su-msg"></p>
            </form>
        </div>

        <div class="toggle-panel">
            <div class="toggle-content">
                 <img src="../assets/full-logo.png" class="logo">
                <h2 id="toggle-title">Welcome to Muverse</h2>
                <p id="toggle-desc">Create you account here</p>
                <button id="toggle-btn"><span id="toggle-btn-text">Sign Up</span></button>
            </div>
        </div>

    </div>

    <script type="module" src="../function/auth.js"></script>

</body>

</html>
